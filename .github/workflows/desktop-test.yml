name: Desktop Tests

on:
  pull_request:
  push:
    branches:
      - master
      - main

jobs:
  desktop-linux:
    name: desktop linux full
    runs-on: ubuntu-latest
    timeout-minutes: 90

    defaults:
      run:
        shell: bash -l {0}

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux Tauri dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            desktop/src-tauri
            llm_wiki/src-tauri

      - uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: true
          python-version: "3.11"
          activate-environment: bearfrp_test

      - name: Install BearFRP Python dependencies
        run: |
          conda run -n bearfrp_test python -m pip install --upgrade pip
          conda run -n bearfrp_test python -m pip install -r bearfrp/requirements.txt

      - name: Install desktop dependencies
        working-directory: desktop
        run: npm ci

      - name: Install Playwright browser
        working-directory: desktop
        run: npm run test:system:install

      - name: Prepare desktop sidecars
        working-directory: desktop
        run: |
          npm run sidecars:frpc
          npm run sidecars

      - name: Run full desktop suite
        working-directory: desktop
        run: npm run ci:check -- --include-system --include-integration --include-fake-stack

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-ubuntu-latest
          path: desktop/playwright-report
          if-no-files-found: ignore

      - name: Upload desktop test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: desktop-test-results-ubuntu-latest
          path: desktop/test-results
          if-no-files-found: ignore

  desktop-native:
    name: desktop native (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-latest
          - windows-latest

    defaults:
      run:
        shell: bash -l {0}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            desktop/src-tauri
            llm_wiki/src-tauri

      - uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: true
          python-version: "3.11"
          activate-environment: bearfrp_test

      - name: Install BearFRP Python dependencies
        run: |
          conda run -n bearfrp_test python -m pip install --upgrade pip
          conda run -n bearfrp_test python -m pip install -r bearfrp/requirements.txt

      - name: Install desktop dependencies
        working-directory: desktop
        run: npm ci

      - name: Prepare native desktop sidecars
        working-directory: desktop
        run: |
          npm run sidecars:frpc
          npm run sidecars

      - name: Check native sidecar layout
        working-directory: desktop
        run: npm run sidecars:check

      - name: Run native Tauri contract tests
        working-directory: desktop
        run: npm run test:contracts

      - name: Run native desktop integration smoke
        working-directory: desktop
        run: npm run test:integration:desktop

      - name: Upload desktop test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: desktop-test-results-${{ matrix.os }}
          path: desktop/test-results
          if-no-files-found: ignore
