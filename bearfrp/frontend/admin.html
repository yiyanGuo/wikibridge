<!doctype html>
<!--
  @file frontend/admin.html
  @brief 管理员控制台页面，用于登录、查看用户/代理、调整端口池和管理连接状态。
  @author BearFrps课程设计小组
  @course 武汉大学开源软件与技术课程 2026
  @date 2026-06-10
  @version 1.0
  @copyright Apache-2.0
  @details
    依赖关系：Tailwind CDN、Alpine.js、shared.css、mock_api.js、后端 /api/admin。
    修改记录：2026-06-10，补充 Doxygen 风格文件头、管理边界和接口说明。
    管理员登录后读取端口池配置、代理列表和用户列表。
    端口池表单允许修改可分配 remotePort 范围，后端负责校验已占用端口。
    代理表格显示所有用户的连接状态，支持停用、恢复和删除。
    用户表格展示余额、充值总额和连接数量，方便课堂演示统计。

    POST /api/admin/login：创建管理员会话。
    POST /api/admin/logout：清理管理员会话。
    GET /api/admin/config：读取端口池配置。
    POST /api/admin/config：更新端口池配置。
    GET /api/admin/proxies：读取全量代理。
    POST /api/admin/proxies/{id}/stop：停用代理但不释放端口。
    POST /api/admin/proxies/{id}/start：恢复代理。
    DELETE /api/admin/proxies/{id}：删除代理并释放端口。
    GET /api/admin/users：读取用户列表。

    页面不保存管理员密码，认证状态由后端 session cookie 决定。
    操作按钮失败时展示后端返回的错误信息，便于定位端口池和权限问题。

    loggedIn 表示管理员 session 是否有效。
    loginForm 保存用户名和密码输入。
    config 保存端口池 start/end。
    proxies 保存后端返回的所有代理。
    users 保存注册用户汇总信息。
    loading 用于避免重复提交管理操作。
    message/error 分别展示成功和失败反馈。

    stopProxy 只把代理状态改为 stopped_by_admin，不释放端口。
    startProxy 恢复代理前仍由后端校验状态。
    deleteProxy 逻辑删除代理并释放 TCP 端口。
    updateConfig 只能提交合法端口范围，已占用端口是否越界由后端决定。
    refreshAll 会同时刷新配置、代理和用户信息，保持表格一致。

    代理状态与用户端使用相同颜色含义。
    TCP 代理展示 remotePort，HTTP/P2P 代理展示类型和公开地址。
    用户列表显示余额和连接数量，便于老师查看资源分配情况。
    时间字段只做展示，不参与前端排序或权限判断。

    管理员接口是高权限接口，正式部署必须修改默认密码。
    管理端页面只做交互约束，不能替代后端权限检查。
    删除代理会影响用户正在使用的脚本，课堂演示前应确认。
  @section admin_page_doxygen Doxygen 注释约束
    管理动作需要说明是否释放端口。
    端口池配置需要说明与 active TCP 代理的关系。
    高权限操作需要说明失败反馈来源。
    页面不保存管理员密码的约束必须保留。
    修改管理端 API 时同步更新全局文档。
  @section admin_page_submission 平时作业提交检查
    管理端必须能登录。
    管理端必须能读取端口池配置。
    管理端必须能展示代理列表。
    管理端必须能展示用户列表。
    管理端停用代理不得释放端口。
    管理端删除代理必须释放端口。
    管理端端口池修改失败时必须显示原因。
  @section admin_page_demo 演示流程映射
    先展示管理员登录。
    再展示端口池配置。
    再展示代理列表。
    再展示用户列表。
    最后说明停用与删除差异。
-->
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BearFRPs - 管理员控制台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="shared.css" />
    <script src="mock_api.js"></script>
  </head>
  <body class="bg-gray-50 min-h-screen text-gray-800" x-data="adminApp()">
    <header class="bg-white border-b border-gray-200 shadow-sm">
      <div class="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between flex-wrap gap-2">
        <div class="flex items-center gap-4">
          <span class="text-lg font-bold text-gray-900">BearFRPs</span>
          <nav class="flex items-center gap-1">
            <a
              href="/user"
              class="px-3 py-1.5 text-sm font-medium rounded-md text-gray-500 hover:text-gray-700 hover:bg-gray-100 transition-colors"
              >用户端</a
            >
            <a href="/admin" class="px-3 py-1.5 text-sm font-medium rounded-md bg-blue-100 text-blue-700">管理端</a>
            <a
              href="/show"
              class="px-3 py-1.5 text-sm font-medium rounded-md text-gray-500 hover:text-gray-700 hover:bg-gray-100 transition-colors"
              >展示页</a
            >
          </nav>
        </div>
        <template x-if="loggedIn">
          <button class="btn btn-secondary btn-sm" @click="logout()">登出</button>
        </template>
      </div>
    </header>

    <template x-if="!loggedIn">
      <main class="max-w-7xl mx-auto px-4 py-12 flex items-center justify-center">
        <div class="bg-white rounded-lg shadow-md border border-gray-200 p-8 w-full max-w-sm">
          <h2 class="text-lg font-bold text-center mb-6">管理员登录</h2>
          <div class="space-y-4">
            <div>
              <label class="block text-sm font-medium text-gray-600 mb-1">用户名</label>
              <input class="input" x-model="loginForm.username" @keydown.enter="login()" />
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-600 mb-1">密码</label>
              <input class="input" type="password" x-model="loginForm.password" @keydown.enter="login()" />
            </div>
            <div x-show="loginError" class="text-red-600 text-sm" x-text="loginError"></div>
            <button
              class="btn btn-primary w-full justify-center"
              @click="login()"
              :disabled="loggingIn"
              x-text="loggingIn ? '登录中...' : '登录'"
            ></button>
          </div>
        </div>
      </main>
    </template>

    <template x-if="loggedIn">
      <main class="max-w-7xl mx-auto px-4 py-4">
        <div class="flex border-b border-gray-200 mb-4">
          <button
            class="px-4 py-2 text-sm font-medium border-b-2 transition-colors"
            :class="tab === 'proxies' ? 'border-blue-600 text-blue-600' : 'border-transparent text-gray-500 hover:text-gray-700'"
            @click="tab = 'proxies'"
          >
            连接总览
          </button>
          <button
            class="px-4 py-2 text-sm font-medium border-b-2 transition-colors"
            :class="tab === 'users' ? 'border-blue-600 text-blue-600' : 'border-transparent text-gray-500 hover:text-gray-700'"
            @click="tab = 'users'"
          >
            用户列表
          </button>
          <button
            class="px-4 py-2 text-sm font-medium border-b-2 transition-colors"
            :class="tab === 'settings' ? 'border-blue-600 text-blue-600' : 'border-transparent text-gray-500 hover:text-gray-700'"
            @click="tab = 'settings'; loadConfig()"
          >
            系统设置
          </button>
        </div>

        <div x-show="tab === 'proxies'">
          <div class="flex items-center gap-3 mb-3 flex-wrap">
            <input class="input" style="max-width: 200px" placeholder="搜索 UID..." x-model="filterUid" />
            <select class="input" style="max-width: 160px" x-model="filterStatus">
              <option value="">全部状态</option>
              <option value="active">活跃</option>
              <option value="stopped_by_admin">已停用</option>
              <option value="deleted">已删除</option>
            </select>
            <span class="text-xs text-gray-400" x-text="'共 ' + filteredProxies.length + ' 条'"></span>
          </div>

          <div class="bg-white rounded-lg shadow-sm border border-gray-200 overflow-x-auto">
            <table>
              <thead>
                <tr class="bg-gray-50">
                  <th>UID</th>
                  <th>名称</th>
                  <th>类型</th>
                  <th>公网入口</th>
                  <th>Token</th>
                  <th>本地服务</th>
                  <th>限速</th>
                  <th>已用 / 限额</th>
                  <th>当前速率</th>
                  <th>状态</th>
                  <th>操作</th>
                </tr>
              </thead>
              <tbody>
                <template x-for="p in filteredProxies" :key="p.id">
                  <tr :class="statusClass(p)">
                    <td class="font-mono text-xs" x-text="p.uid"></td>
                    <td class="font-medium" x-text="p.name"></td>
                    <td>
                      <span class="status-badge" :class="proxyTypeBadge(p)" x-text="proxyTypeLabel(p)"></span>
                    </td>
                    <td class="font-mono text-sm max-w-[260px] truncate">
                      <a
                        :href="p.public_url"
                        target="_blank"
                        rel="noopener"
                        class="text-blue-600 hover:text-blue-800 hover:underline transition-colors"
                        x-show="p.public_url"
                        x-text="publicEntry(p)"
                        :title="mappingDetails(p) || p.public_url"
                      ></a>
                      <span x-show="!p.public_url" x-text="publicEntry(p)" :title="mappingDetails(p)"></span>
                    </td>
                    <td
                      class="font-mono text-xs text-gray-500 max-w-[120px] truncate"
                      x-text="p.token"
                      :title="p.token"
                    ></td>
                    <td class="font-mono text-sm" x-text="localEndpoint(p)" :title="mappingDetails(p)"></td>
                    <td class="text-sm" x-text="p.speed_limit_kbps + ' KB/s'"></td>
                    <td>
                      <div class="flex items-center gap-2">
                        <div class="progress-bar-bg flex-1">
                          <div
                            class="progress-bar-fill"
                            :class="trafficPercent(p) > 90 ? 'fill-danger' : trafficPercent(p) > 70 ? 'fill-warn' : 'fill-ok'"
                            :style="'width:' + Math.min(trafficPercent(p), 100) + '%'"
                          ></div>
                        </div>
                        <span
                          class="text-xs text-gray-500 whitespace-nowrap"
                          x-text="formatBytes(p.traffic_used_bytes) + ' / ' + p.traffic_limit_mb + ' MB'"
                        ></span>
                      </div>
                    </td>
                    <td class="text-sm" x-text="formatSpeed(p.current_speed_bps)"></td>
                    <td>
                      <span class="status-badge" :class="statusBadge(p).cls" x-text="statusBadge(p).text"></span>
                    </td>
                    <td class="space-x-1">
                      <template x-if="p.status === 'active'">
                        <button class="btn btn-danger btn-sm" @click="stopProxy(p)">停用</button>
                      </template>
                      <template x-if="p.status === 'stopped_by_admin'">
                        <button class="btn btn-success btn-sm" @click="startProxy(p)">启用</button>
                      </template>
                      <button class="btn btn-danger btn-sm" @click="deleteProxy(p)">删除</button>
                    </td>
                  </tr>
                </template>
                <tr x-show="filteredProxies.length === 0">
                  <td colspan="11" class="text-center text-gray-400 py-8">暂无数据</td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>

        <div x-show="tab === 'users'">
          <div class="bg-white rounded-lg shadow-sm border border-gray-200 overflow-x-auto">
            <table>
              <thead>
                <tr class="bg-gray-50">
                  <th>用户名</th>
                  <th>UID</th>
                  <th>注册时间</th>
                  <th>余额</th>
                  <th>累计充值</th>
                  <th>当前连接数</th>
                </tr>
              </thead>
              <tbody>
                <template x-for="u in users" :key="u.uid">
                  <tr>
                    <td class="text-sm font-medium" x-text="u.username || '-'"></td>
                    <td class="font-mono text-sm" x-text="u.uid"></td>
                    <td class="text-sm" x-text="new Date(u.created_at).toLocaleString('zh-CN')"></td>
                    <td class="text-sm font-medium" x-text="u.balance_mb + ' MB'"></td>
                    <td class="text-sm" x-text="u.total_recharged_mb + ' MB'"></td>
                    <td class="text-sm" x-text="u.connection_count"></td>
                  </tr>
                </template>
                <tr x-show="users.length === 0">
                  <td colspan="6" class="text-center text-gray-400 py-8">暂无用户</td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>

        <div x-show="tab === 'settings'">
          <div class="bg-white rounded-lg shadow-sm border border-gray-200 p-6 max-w-md">
            <h3 class="text-base font-semibold text-gray-800 mb-4">可分配端口段</h3>
            <div class="space-y-3">
              <div class="flex items-center gap-2">
                <label class="text-sm text-gray-600 w-16">起始端口</label>
                <input class="input" type="number" x-model="portRangeStart" />
              </div>
              <div class="flex items-center gap-2">
                <label class="text-sm text-gray-600 w-16">结束端口</label>
                <input class="input" type="number" x-model="portRangeEnd" />
              </div>
              <div class="text-sm text-gray-500">
                可用端口数: <span class="font-mono font-medium" x-text="availablePortCount"></span>
              </div>
              <div x-show="configError" class="text-red-600 text-sm" x-text="configError"></div>
              <div x-show="configSaved" class="text-green-600 text-sm">保存成功</div>
              <button
                class="btn btn-primary"
                @click="saveConfig()"
                :disabled="savingConfig"
                x-text="savingConfig ? '保存中...' : '保存设置'"
              ></button>
            </div>
          </div>
        </div>
      </main>
    </template>

    <script>
      function adminApp() {
        return {
          loggedIn: false,
          loginForm: { username: "", password: "" },
          loginError: "",
          loggingIn: false,
          tab: "proxies",
          proxies: [],
          users: [],
          filterUid: "",
          filterStatus: "",
          pollTimer: null,
          portRangeStart: 50000,
          portRangeEnd: 50100,
          availablePortCount: 0,
          configError: "",
          configSaved: false,
          savingConfig: false,

          async init() {
            this.loggedIn = false
          },

          async login() {
            this.loginError = ""
            this.loggingIn = true
            try {
              const res = await fetch("/api/admin/login", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                credentials: "same-origin",
                body: JSON.stringify(this.loginForm),
              })
              if (!res.ok) {
                const data = await res.json()
                this.loginError = extractDetail(data) || "登录失败"
                return
              }
              this.loggedIn = true
              this.pollTimer = setInterval(() => this.refresh(), 3000)
              await this.refresh()
            } finally {
              this.loggingIn = false
            }
          },

          async logout() {
            await fetch("/api/admin/logout", { method: "POST", credentials: "same-origin" })
            this.loggedIn = false
            if (this.pollTimer) clearInterval(this.pollTimer)
          },

          async refresh() {
            if (this.tab === "proxies") await this.loadProxies()
            if (this.tab === "users") await this.loadUsers()
            if (this.tab === "settings") await this.loadConfigCount()
          },

          async loadProxies() {
            const res = await fetch("/api/admin/proxies", { credentials: "same-origin" })
            if (res.status === 401) {
              this.loggedIn = false
              return
            }
            const data = await res.json()
            this.proxies = data.proxies || []
          },

          async loadUsers() {
            const res = await fetch("/api/admin/users", { credentials: "same-origin" })
            if (res.status === 401) {
              this.loggedIn = false
              return
            }
            const data = await res.json()
            this.users = data.users || []
          },

          get filteredProxies() {
            return this.proxies.filter((p) => {
              if (this.filterUid && !p.uid.includes(this.filterUid)) return false
              if (this.filterStatus && p.status !== this.filterStatus) return false
              return true
            })
          },

          async stopProxy(p) {
            await fetch("/api/admin/proxies/" + p.id + "/stop", { method: "POST", credentials: "same-origin" })
            await this.loadProxies()
            toast("已停用")
          },

          async startProxy(p) {
            await fetch("/api/admin/proxies/" + p.id + "/start", { method: "POST", credentials: "same-origin" })
            await this.loadProxies()
            toast("已启用")
          },

          async deleteProxy(p) {
            if (!confirm('确定删除 "' + p.name + '"？')) return
            await fetch("/api/admin/proxies/" + p.id, { method: "DELETE", credentials: "same-origin" })
            await this.loadProxies()
            toast("已删除")
          },

          async loadConfig() {
            try {
              const res = await fetch("/api/admin/config", { credentials: "same-origin" })
              if (!res.ok) {
                if (res.status === 401) {
                  this.loggedIn = false
                }
                return
              }
              const data = await res.json()
              if (typeof data.allocatable_port_range_start === "number") {
                this.portRangeStart = data.allocatable_port_range_start
              }
              if (typeof data.allocatable_port_range_end === "number") {
                this.portRangeEnd = data.allocatable_port_range_end
              }
              if (typeof data.available_port_count === "number") {
                this.availablePortCount = data.available_port_count
              }
            } catch (e) {
              console.error("loadConfig", e)
            }
          },

          async loadConfigCount() {
            try {
              const res = await fetch("/api/admin/config", { credentials: "same-origin" })
              if (!res.ok) {
                if (res.status === 401) {
                  this.loggedIn = false
                }
                return
              }
              const data = await res.json()
              if (typeof data.available_port_count === "number") {
                this.availablePortCount = data.available_port_count
              }
            } catch (e) {
              console.error("loadConfigCount", e)
            }
          },

          async saveConfig() {
            this.configError = ""
            this.configSaved = false
            this.savingConfig = true
            try {
              const res = await fetch("/api/admin/config", {
                method: "PUT",
                headers: { "Content-Type": "application/json" },
                credentials: "same-origin",
                body: JSON.stringify({
                  start: Number(this.portRangeStart),
                  end: Number(this.portRangeEnd),
                }),
              })
              if (!res.ok) {
                try {
                  const data = await res.json()
                  this.configError = extractDetail(data) || "保存失败"
                } catch {
                  this.configError = "保存失败 (" + res.status + ")"
                }
                return
              }
              this.configSaved = true
              await this.loadConfig()
            } catch (e) {
              this.configError = "网络错误"
              console.error("saveConfig", e)
            } finally {
              this.savingConfig = false
            }
          },

          trafficPercent(p) {
            if (!p.traffic_limit_mb) return 0
            return (p.traffic_used_bytes / (p.traffic_limit_mb * 1024 * 1024)) * 100
          },

          proxyTypeLabel(p) {
            if (p.proxy_type === "http") return "HTTP"
            if (p.proxy_type === "xtcp") return "P2P"
            return "TCP"
          },

          proxyTypeBadge(p) {
            if (p.proxy_type === "http") return "badge-online"
            if (p.proxy_type === "xtcp") return "badge-disabled"
            return "badge-offline"
          },

          publicEntry(p) {
            if (p.proxy_type === "tcp") {
              var mappings = this.tcpMappings(p)
              if (mappings.length) {
                var host = this.publicHost(p)
                return host ? host + ":" + this.remotePortSummary(p) : this.remotePortSummary(p)
              }
              if (p.frps_remote_port != null) return String(p.frps_remote_port)
            }
            if (p.proxy_type === "xtcp") return p.visitor_endpoint || "127.0.0.1:9001"
            if (p.public_url) return p.public_url.replace(/^https?:\/\//, "").replace(/\/$/, "")
            return "-"
          },

          localEndpoint(p) {
            var ip = p.local_ip || "127.0.0.1"
            if (p.proxy_type === "xtcp") return ip + ":" + p.local_port
            if (p.proxy_type === "tcp") {
              var mappings = this.tcpMappings(p)
              if (mappings.length) return ip + ":" + this.localPortSummary(mappings)
            }
            var port = p.actual_local_port != null ? p.actual_local_port : p.local_port
            return port != null ? ip + ":" + port : ip + ":-"
          },

          tcpMappings(p) {
            if (!p || p.proxy_type !== "tcp") return []
            if (Array.isArray(p.tcp_mappings) && p.tcp_mappings.length) return p.tcp_mappings
            if (p.frps_remote_port != null) {
              return [
                { remote_port: p.frps_remote_port, local_port: p.local_port, actual_local_port: p.actual_local_port },
              ]
            }
            return []
          },

          remotePortSummary(p) {
            var mappings = this.tcpMappings(p)
            return this.portSummary(
              mappings.map(function (m) {
                return m.remote_port
              }),
            )
          },

          localPortSummary(mappings) {
            return this.portSummary(
              mappings.map(function (m) {
                return m.actual_local_port != null ? m.actual_local_port : m.local_port
              }),
            )
          },

          portSummary(ports) {
            var nums = ports.map(Number).filter(function (n) {
              return n >= 1
            })
            if (!nums.length) return "-"
            nums.sort(function (a, b) {
              return a - b
            })
            if (nums.length === 1) return String(nums[0])
            var contiguous = nums.every(function (port, idx) {
              return idx === 0 || port === nums[idx - 1] + 1
            })
            if (contiguous) return nums[0] + "-" + nums[nums.length - 1]
            return nums.join(", ")
          },

          mappingDetails(p) {
            var ip = (p && p.local_ip) || "127.0.0.1"
            if (p && p.proxy_type === "xtcp")
              return "手机端 " + (p.visitor_endpoint || "127.0.0.1:9001") + "\n电脑端 " + ip + ":" + p.local_port
            return this.tcpMappings(p)
              .map(function (m) {
                return m.remote_port + " -> " + ip + ":" + m.local_port
              })
              .join("\n")
          },

          publicHost(p) {
            if (!p || !p.public_url) return ""
            try {
              return new URL(p.public_url).hostname
            } catch (e) {
              return ""
            }
          },
        }
      }

      function extractDetail(data) {
        if (!data) return ""
        if (typeof data.detail === "string") return data.detail
        if (Array.isArray(data.detail) && data.detail.length > 0) {
          return data.detail
            .map(function (e) {
              return e.msg || String(e)
            })
            .join("; ")
        }
        return String(data.detail || "")
      }
    </script>
  </body>
</html>
